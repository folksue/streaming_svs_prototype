__base__:
  - runtime_default_100m.yaml

audio:
  encodec_bandwidth: 6.0
  expected_num_codebooks: 8
  preprocess_batch_size: 8

data:
  cache_shard_items: 2048
  batch_size: 32
  num_workers: 2
  max_seq_len: 256

train:
  epochs: 80
  lr: 2.0e-4
  weight_decay: 1.0e-2
  grad_clip: 1.0
  warmup_steps: 1000
  use_amp: true
  log_interval: 20
  val_interval: 1
  ckpt_interval_epochs: 10

logging:
  backends: ["console", "tensorboard"]
  tensorboard_dir: artifacts/runs/mixed_4ds_ace_100m_8cq
  run_name: mixed-4ds-ace-100m-8cq
  wandb_mode: offline

paths:
  checkpoints: artifacts/checkpoints/mixed_4ds_ace_100m_8cq
  outputs: artifacts/outputs/mixed_4ds_ace_100m_8cq
