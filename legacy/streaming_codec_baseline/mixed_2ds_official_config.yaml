seed: 42

audio:
  sample_rate: 24000
  tokens_per_step: 1
  encodec_model_name: facebook/encodec_24khz
  encodec_bandwidth: 6.0
  expected_num_codebooks: 8

data:
  train_manifest: artifacts/data/mixed_official_train_manifest.json
  valid_manifest: artifacts/data/mixed_official_valid_manifest.json
  manifest_adapter: manifest
  train_manifest_adapter: manifest
  valid_manifest_adapter: manifest
  train_audio_root: null
  valid_audio_root: null
  auto_split_valid: false
  valid_ratio: 0.05
  min_valid_items: 1
  phoneme_vocab_path: artifacts/data/mixed_official_phoneme_vocab.json
  train_cache: artifacts/data/mixed_official_train_codes.pt
  valid_cache: artifacts/data/mixed_official_valid_codes.pt
  batch_size: 4
  num_workers: 4
  max_seq_len: 256

model:
  note_vocab_size: 256
  note_emb_dim: 192
  phoneme_vocab_size: 2048
  phoneme_emb_dim: 192
  slur_emb_dim: 32
  phone_progress_bins: 8
  phone_progress_emb_dim: 64
  cond_dim: 384
  token_emb_dim: 192
  prev_step_dim: 384
  model_dim: 1536
  attn_heads: 12
  attn_layers: 6
  history_window: 16
  num_blocks: 8
  audio_history_window: 64
  control_encoder_type: mlp
  control_conv_layers: 0
  control_conv_hidden_mult: 2.0
  control_conv_kernel_size: 7
  control_conv_dilation: 1
  ablation_prefix_pad_steps: 0
  rope_base: 10000.0
  ffn_mult: 2.6666666667
  attn_bias: false
  ffn_bias: false
  norm_eps: 1.0e-6

train:
  epochs: 80
  lr: 2.0e-4
  weight_decay: 1.0e-2
  grad_clip: 1.0
  warmup_steps: 1000
  use_amp: true
  log_interval: 50
  val_interval: 1

logging:
  backends: ["console", "tensorboard"]
  tensorboard_dir: artifacts/runs/mixed_2ds_official_100m
  wandb_project: streaming-svs
  run_name: mixed-2ds-official-100m
  wandb_mode: offline

paths:
  checkpoints: artifacts/checkpoints/mixed_2ds_official_100m
  outputs: artifacts/outputs/mixed_2ds_official_100m
