seed: 42

audio:
  sample_rate: 24000
  tokens_per_step: 1
  encodec_model_name: facebook/encodec_24khz
  encodec_bandwidth: 6.0
  expected_num_codebooks: 8

data:
  train_manifest: artifacts/data/train_manifest.json
  valid_manifest: artifacts/data/valid_manifest.json
  manifest_adapter: manifest
  train_manifest_adapter: manifest
  valid_manifest_adapter: manifest
  train_audio_root: null
  valid_audio_root: null
  auto_split_valid: false
  valid_ratio: 0.05
  min_valid_items: 1
  phoneme_vocab_path: artifacts/data/phoneme_vocab.json
  singer_vocab_path: artifacts/data/singer_vocab.json
  train_cache: artifacts/data/train_chunks.pt
  valid_cache: artifacts/data/valid_chunks.pt
  train_raw_codes_cache: artifacts/data/train_encodec_raw.pt
  valid_raw_codes_cache: artifacts/data/valid_encodec_raw.pt
  batch_size: 8
  num_workers: 2
  max_seq_len: 256

model:
  # Tiny model (~4.34M params when K=8, V=1024, S=1).
  note_vocab_size: 256
  note_emb_dim: 64
  phoneme_vocab_size: 1024
  phoneme_emb_dim: 64
  slur_emb_dim: 8
  phone_progress_bins: 8
  phone_progress_emb_dim: 16
  singer_vocab_size: 128
  singer_emb_dim: 16
  cond_dim: 128
  token_emb_dim: 96
  prev_step_dim: 128
  model_dim: 192
  attn_heads: 6
  attn_layers: 2
  history_window: 16
  num_blocks: 2
  audio_history_window: 64
  control_encoder_type: mlp
  control_conv_layers: 0
  control_conv_hidden_mult: 2.0
  control_conv_kernel_size: 7
  control_conv_dilation: 1
  # ===== Ablation knobs (keep future ablation params in this block) =====
  ablation_prefix_pad_steps: 0
  # ===== End ablation knobs =====
  rope_base: 10000.0
  ffn_mult: 2.6666666667
  attn_bias: false
  ffn_bias: false
  norm_eps: 1.0e-6

train:
  epochs: 80
  lr: 1.0e-4
  weight_decay: 1.0e-2
  grad_clip: 1.0
  warmup_steps: 2000
  use_amp: true
  log_interval: 20
  val_interval: 1

logging:
  backends: ["console", "tensorboard"]
  tensorboard_dir: artifacts/runs/tiny_4m
  wandb_project: streaming-svs
  run_name: tiny-4m
  wandb_mode: offline

paths:
  checkpoints: artifacts/checkpoints/tiny_4m
  outputs: artifacts/outputs/tiny_4m
